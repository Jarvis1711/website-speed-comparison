{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <h2>{% if item %}Edit{% else %}Create{% endif %} Item</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="post" class="form-grid">
        <label>
            <span>Title</span>
            <input name="title" value="{{ item.title if item else '' }}" placeholder="Enter title" required>
        </label>

        <label>
            <span>Status</span>
            <select name="status">
                {% set current_status = item.status if item else 'planned' %}
                <option value="planned" {{ 'selected' if current_status == 'planned' else '' }}>planned</option>
                <option value="active" {{ 'selected' if current_status == 'active' else '' }}>active</option>
                <option value="done" {{ 'selected' if current_status == 'done' else '' }}>done</option>
            </select>
        </label>

        <label class="full-width">
            <span>Details</span>
            <textarea name="details" rows="6" placeholder="Describe the item" required>{{ item.details if item else '' }}</textarea>
        </label>

        <div class="row">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-ghost" href="{{ url_for('dashboard') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
