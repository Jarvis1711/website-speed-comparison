{% extends "base.html" %}

{% block content %}
<section class="form-card">
  <h2>{% if item %}Edit{% else %}Create{% endif %} {{ config.ENTITY }}</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}

  <form method="post" class="form-grid">
    <label>
      <span>Title</span>
      <input name="title" value="{{ item.title if item else '' }}" required>
    </label>

    <label>
      <span>Status</span>
      <select name="status">
        {% set current_status = item.status if item else statuses[0] %}
        {% for status in statuses %}
        <option value="{{ status }}" {{ 'selected' if status == current_status else '' }}>{{ status }}</option>
        {% endfor %}
      </select>
    </label>

    {% for f in field_schema %}
    <label class="full-width">
      <span>{{ f.label }}</span>
      {% if f.type == 'textarea' %}
      <textarea name="{{ f.key }}" rows="4">{{ item.payload.get(f.key, '') if item else '' }}</textarea>
      {% else %}
      <input name="{{ f.key }}" type="{{ 'number' if f.type == 'number' else 'text' }}" value="{{ item.payload.get(f.key, '') if item else '' }}">
      {% endif %}
    </label>
    {% endfor %}

    <div class="actions-row">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-ghost" href="{{ url_for('web.dashboard') }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
